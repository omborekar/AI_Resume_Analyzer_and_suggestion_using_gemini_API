version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-base
    container_name: resumeiq-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_PORT=5000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    volumes:
      - ./app.py:/app/app.py
      - ./agents:/app/agents
      - ./utils:/app/utils
      - ./knowledge_base:/app/knowledge_base
      - resume_temp:/app/temp
      - resume_db:/app/resumes.db
    command: python app.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: node:20-slim
    container_name: resumeiq-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  resume_temp:
  resume_db:
